version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru

  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
